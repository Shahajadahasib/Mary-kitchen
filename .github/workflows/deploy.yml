name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  test:
    name: Run CI tests
    uses: ./.github/workflows/ci.yml

  deploy-backend:
    name: Deploy Backend (Render)
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - name: Trigger Render deploy
        run: curl -f -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}" --retry 3 --retry-delay 5

  deploy-frontend:
    name: Deploy Frontend (Render)
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - name: Trigger Render deploy
        run: curl -f -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}" --retry 3 --retry-delay 5
