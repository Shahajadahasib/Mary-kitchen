name: Deploy to Production

on:
    push:
        branches:
            - main

jobs:
    test:
        name: Frontend (Next.js)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Type check
              working-directory: frontend
              run: npx tsc --noEmit

            - name: Lint
              working-directory: frontend
              run: npm run lint
              continue-on-error: true

    connectivity:
        name: Check SSH connectivity
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: Test SSH port reachability
              run: |
                  sudo apt-get update
                  sudo apt-get install -y netcat
                  echo "Testing SSH connectivity to ${{ secrets.VPS_HOST }}:22"
                  nc -vz ${{ secrets.VPS_HOST }} 22

    deploy:
        name: Deploy to VPS
        runs-on: ubuntu-latest
        needs: test
        timeout-minutes: 30

        steps:
            - name: Write SSH key to file
              run: |
                  cat > /tmp/deploy_key <<'EOF'
                    ${{ secrets.VPS_SSH_KEY }}
                    EOF
                  chmod 600 /tmp/deploy_key

            - name: Deploy with zero downtime
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key_path: /tmp/deploy_key
                  port: 22
                  timeout: 120s
                  command_timeout: 25m
                  debug: true
                  script: |
                      set -e
                      cd /var/www/Mary-kitchen

                      echo "⬇️ Pulling latest code..."
                      git pull origin main

                      echo "🔨 Building new images..."
                      docker-compose build

                      echo "🗄️ Running migrations..."
                      docker-compose run --rm backend python manage.py migrate --no-input

                      echo "📁 Collecting static files..."
                      docker-compose run --rm backend python manage.py collectstatic --no-input

                      echo "🔄 Restarting services one by one with forced recreation..."
                      docker-compose up -d --no-deps --force-recreate backend
                      sleep 10
                      docker-compose up -d --no-deps --force-recreate celery_worker
                      sleep 5
                      docker-compose up -d --no-deps --force-recreate celery_beat
                      sleep 5
                      docker-compose up -d --no-deps --force-recreate frontend
                      sleep 15

                      echo "🧹 Cleaning up old images..."
                      docker image prune -f

                      echo "✅ Deployment complete with zero downtime!"
