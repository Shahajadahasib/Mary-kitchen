name: Deploy to Production

on:
    push:
        branches:
            - main

jobs:
    test:
        name: Frontend (Next.js)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              working-directory: frontend
              run: npm ci

            - name: Type check
              working-directory: frontend
              run: npx tsc --noEmit

            - name: Lint
              working-directory: frontend
              run: npm run lint
              continue-on-error: true

    deploy:
        name: Deploy to VPS
        runs-on: ubuntu-latest
        needs: test
        timeout-minutes: 30

        steps:
            - name: Wait for VPS to be reachable
              run: |
                  echo "Checking VPS connectivity..."
                  for i in {1..5}; do
                    if nc -z -w 10 ${{ secrets.VPS_HOST }} 22; then
                      echo "✅ VPS port 22 is reachable"
                      break
                    fi
                    echo "Attempt $i failed, waiting 15 seconds..."
                    sleep 15
                  done

            - name: Deploy with zero downtime
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  port: 22
                  timeout: 120s
                  command_timeout: 25m
                  script: |
                      set -e
                      cd /var/www/Mary-kitchen

                      echo "⬇️ Pulling latest code..."
                      git pull origin main

                      echo "🔨 Building new images without stopping current containers..."
                      docker-compose build

                      echo "🗄️ Running migrations..."
                      docker-compose run --rm backend python manage.py migrate --no-input

                      echo "📁 Collecting static files..."
                      docker-compose run --rm backend python manage.py collectstatic --no-input

                      echo "🔄 Restarting services one by one..."
                      docker-compose up -d --no-deps backend
                      sleep 10
                      docker-compose up -d --no-deps celery_worker
                      sleep 5
                      docker-compose up -d --no-deps celery_beat
                      sleep 5
                      docker-compose up -d --no-deps frontend
                      sleep 15

                      echo "🧹 Cleaning up old images..."
                      docker image prune -f

                      echo "✅ Deployment complete with zero downtime!"
